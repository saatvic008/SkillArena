services:
  - type: web
    name: skillarena-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: skillarena-backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: DATABASE_URL
        fromDatabase:
          name: skillarena-db
          property: connectionString
      - key: REDIS_URL
        value: YOUR_UPSTASH_REDIS_URL
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: FRONTEND_URL
        value: https://skillarena.onrender.com
    healthCheckPath: /api/v1/health

  - type: web
    name: skillarena-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: skillarena-frontend
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: skillarena-db
    plan: free
    databaseName: skillarena
    user: skillarena
